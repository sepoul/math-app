# CI is PUBLISH-ONLY: it builds + pushes the math-ui image to GHCR. It does
# NOT deploy. A GitHub-hosted runner isn't on the tailnet and can't reach the
# box, so deploy is operator-driven from a tailnet machine / the box:
#   - pull images:     infra/hetzner/scripts/redeploy.sh   (on the box)
#   - register wheels: aiplatform deploy --bundle <pkg>/bundle.toml \
#                        --api-url http://mathapp-prod:8000  (from the tailnet)
#
#   secrets.GITHUB_TOKEN  (default) — ghcr.io login. The ghcr.io/sepoul/math-ui
#                         package must grant this repo (sepoul/math-app) write
#                         access, or the push is denied.

name: Publish math-app images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout math-app into ./math-app
        uses: actions/checkout@v4
        with:
          path: math-app

      - name: Checkout ai-platform into ./ai-platform (sibling layout)
        uses: actions/checkout@v4
        with:
          repository: sepoul/ai-platform
          path: ai-platform
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build context is the workflow workspace, which has the sibling layout
      # the Dockerfile expects: ./math-app/math-ui/ + ./ai-platform/sdk-ts/
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: math-app/math-ui/Dockerfile
          push: true
          tags: |
            ghcr.io/sepoul/math-ui:latest
            ghcr.io/sepoul/math-ui:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=math-ui
          cache-to: type=gha,mode=max,scope=math-ui
