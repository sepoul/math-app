[project]
name = "mathai-math-mentor"
version = "0.2.0"
description = "math_mentor domain — the tutoring layer over the book-RAG corpus. Ships the GroundedAnchor resolver (#68 — the single seam onto the `book_retrieve` job) and the detection pass (#69 — a trailing-window read-model over daily notes that extracts grounded candidate signals: abandoned_crux / unverified_proof / ripe_bridge). Pure extraction logic: all book grounding rides exclusively through `resolve_anchor`, and the one LLM-shaped step (verbatim-quote pull, resolution-clause judging) is injected behind a `SignalExtractor` port. No fire/silence decision (that's #70), no mentoring graph, no deploy wiring yet. Runtime = default (pydantic ecosystem)."
requires-python = ">=3.13"

# Control-plane-only deps. This package is the *contract* + resolver LOGIC for
# the anchor seam; it stays engine-free (pydantic only) and reads retrieval
# exclusively through the `BookRetrieveFn` port.
#   * `mathai-math-book` — the single source of truth for the retrieval contract
#     types (`BookRetrieveInput` / `BookRetrievalResult` / `BookRetrievalHit` /
#     `RetrievalIntent`). We import them from `mathai.math_book.models`; we never
#     redefine them.
#   * `aiplatform-core` — provides `PlatformSession` (used only by the thin
#     `PlatformBookRetrieve` adapter, imported lazily so unit tests never need
#     the platform) and the `BaseJobInput`/`BaseJobResult` bases the math_book
#     contract types build on.
#   * `pydantic` — the `GroundedAnchor` / `CandidateSignal` / `NoteView` models.
#   * `mathai-math-notes` — the real `DailyNoteArtifact` / `NoteSynthesis` /
#     `NoteMagnitude` / `NoteFlair` types the `from_daily_note` adapter (#69)
#     mirrors into a `NoteView`. Imported LAZILY inside the adapter (like the
#     platform adapter's lazy `ai_platform` import), so the core detection logic
#     — run on hand-built `NoteView`s — never needs `math_notes` loaded.
dependencies = [
    "mathai-math-book>=0.3.0",
    "mathai-math-notes>=0.2.0",
    "aiplatform-core>=0.1.1",
    "pydantic>=2.12.5",
]

[project.optional-dependencies]
# Test-only deps. The resolver is exercised entirely through an in-memory fake
# port (no live platform, no network), so pytest is all the test env needs.
test = [
    "pytest>=8",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
