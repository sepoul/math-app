[project]
name = "mathai-math-qa"
version = "0.1.0"
description = "math_qa domain — pydantic_ai-driven Q&A workflow producing typed math artifacts (question, answer, latex, figure). Ships in the `default` worker runtime."
requires-python = ">=3.13"

# Control-plane-only deps. The control module (`mathai.math_qa.control`) is
# imported by the API at boot to register the JobControl + artifact types;
# it must stay engine-free, so we don't pull pydantic_ai / pydantic_graph
# here. The platform's `aiplatform-core` covers everything control-side needs.
dependencies = [
    "aiplatform-core",
]

[project.optional-dependencies]
# Execution-side deps — pulled by `packages/worker[default]`. These are the
# pydantic_ai + Anthropic + Logfire stack the workflow's nodes import at
# runtime (basic_agent, etc.). Logfire is here (not on the crewai domain)
# because of the otel-sdk pin: this stack needs >=1.39, crewai needs <1.35,
# they cannot coexist in one interpreter — runtime isolation lives in the
# package boundary.
execution = [
    "pydantic-ai-slim[anthropic,duckduckgo,logfire]>=1.58.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
# `aiplatform-core` lives in the ai-platform repo. CI installs it from
# the upstream git URL (see .github/workflows/deploy.yml). Local-dev
# can either install it from a sibling checkout (preferred) or from
# the same git URL. Set MATHAPP_AIPLATFORM_PATH to use a local source.
aiplatform-core = { git = "https://github.com/sepoul/ai-platform.git", subdirectory = "packages/core" }
