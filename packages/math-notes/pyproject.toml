[project]
name = "mathai-math-notes"
version = "0.2.2"
description = "math_notes domain — daily-notes ingest. A learner uploads a voice note (+ optional notebook photos) via POST /media; this job transcribes the audio and faithfully extracts each photo, then runs one holistic Opus synthesis pass over the whole note to reconstruct the intended math. Persists one storage_ref-backed DailyNoteArtifact document carrying the transcript, raw page children, and a note-level synthesis. Ships in the `default` worker runtime."
requires-python = ">=3.13"

# Control-plane-only deps. The control module (`mathai.math_notes.control`)
# is imported by the API at boot (and by `aiplatform declare-artifacts`) to
# register the JobControl + artifact types; it must stay engine-free, so we
# don't pull any LLM / vision stack here. `aiplatform-core` covers everything
# control-side needs.
dependencies = [
    "aiplatform-core>=0.1.1",
]

[project.optional-dependencies]
# Execution-side deps — pulled by `packages/worker[default]`. Intentionally
# EMPTY: transcription uses the platform's `AudioInterpreter` and the `openai`
# SDK that ships in the worker base (present in both runtimes), so the domain
# pulls no AI/LLM library of its own. A later OCR step over `image_refs` would
# likewise lean on a platform-provided helper, not a domain dep.
execution = []

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
